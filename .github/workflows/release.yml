name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun test
      - run: bun run build

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arena-mcp-*.tgz
            dist/index.js
          generate_release_notes: true
          body: |
            ## Installation

            ### From GitHub (Recommended)
            ```bash
            # Install globally
            bun install -g github:tim101010101/arena

            # Or use with bunx (no installation needed)
            bunx --bun github:tim101010101/arena
            ```

            ### From tarball
            ```bash
            bun install -g https://github.com/tim101010101/arena/releases/download/${{ github.ref_name }}/arena-mcp-${{ github.ref_name }}.tgz
            ```

            ### Claude Desktop Configuration
            ```json
            {
              "mcpServers": {
                "arena": {
                  "command": "bunx",
                  "args": ["--bun", "github:tim101010101/arena"],
                  "env": {
                    "ANTHROPIC_API_KEY": "your-key",
                    "OPENAI_API_KEY": "your-key",
                    "GEMINI_API_KEY": "your-key"
                  }
                }
              }
            }
            ```
